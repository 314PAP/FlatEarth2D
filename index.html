<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0a0a1a" />
    <title>Flat Earth 2D</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%; height: 100%;
        background: #0a0a1a;
        overflow: hidden;
        font-family: 'Segoe UI', sans-serif;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
      }

      #game-wrapper {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #game-canvas {
        display: block;
        background: #1a1a2e;
        image-rendering: pixelated;
      }

      /* ─── Dotykový gamepad ─────────────────────────────── */
      #touch-overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
        display: none;
      }

      #touch-overlay.active { display: block; }

      .touch-zone {
        position: absolute;
        pointer-events: all;
      }

      /* Levá zóna – D-pad */
      #zone-left {
        left: 12px; bottom: 16px;
        width: 180px; height: 180px;
      }

      #dpad {
        position: relative;
        width: 180px; height: 180px;
      }

      .dpad-btn {
        position: absolute;
        width: 54px; height: 54px;
        background: rgba(255,255,255,0.12);
        border: 2px solid rgba(255,255,255,0.3);
        border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        color: #fff; font-size: 22px;
        cursor: pointer;
        transition: background 0.1s;
      }
      .dpad-btn:active, .dpad-btn.pressed {
        background: rgba(255,255,255,0.35);
      }

      #dpad-left  { left: 0;   top: 63px; }
      #dpad-right { left: 126px; top: 63px; }

      /* Pravá zóna – akční tlačítka */
      #zone-right {
        right: 12px; bottom: 16px;
        width: 200px; height: 180px;
      }

      .action-btn {
        position: absolute;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 13px; font-weight: bold; color: #fff;
        cursor: pointer;
        border: 2px solid rgba(255,255,255,0.4);
        transition: transform 0.08s, opacity 0.08s;
        text-align: center;
      }
      .action-btn:active, .action-btn.pressed {
        transform: scale(0.9);
        opacity: 0.75;
      }

      #btn-jump {
        width: 68px; height: 68px;
        background: rgba(60,180,255,0.55);
        right: 10px; bottom: 90px;
        font-size: 11px;
      }

      #btn-attack {
        width: 58px; height: 58px;
        background: rgba(255,100,60,0.55);
        right: 90px; bottom: 16px;
        font-size: 11px;
      }

      #btn-ultimate {
        width: 74px; height: 74px;
        background: radial-gradient(circle, rgba(255,220,0,0.9) 0%, rgba(255,100,200,0.7) 70%);
        left: 0; bottom: 50px;
        font-size: 10px;
        box-shadow: 0 0 18px 6px rgba(255,200,50,0.7);
        animation: pulse-glow 1.8s ease-in-out infinite;
        border: 3px solid gold;
      }
      #btn-ultimate.disabled {
        background: rgba(80,80,80,0.5);
        box-shadow: none;
        animation: none;
        border-color: rgba(255,255,255,0.2);
      }

      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 18px 6px rgba(255,200,50,0.7); }
        50%       { box-shadow: 0 0 30px 14px rgba(255,200,50,0.95); }
      }
    </style>
  </head>
  <body>
    <div id="game-wrapper">
      <canvas id="game-canvas"></canvas>

      <div id="touch-overlay">
        <!-- Pohyb -->
        <div class="touch-zone" id="zone-left">
          <div id="dpad">
            <div class="dpad-btn" id="dpad-left">◀</div>
            <div class="dpad-btn" id="dpad-right">▶</div>
          </div>
        </div>

        <!-- Akce -->
        <div class="touch-zone" id="zone-right">
          <div class="action-btn" id="btn-jump">SKOK</div>
          <div class="action-btn" id="btn-attack">ÚTOK</div>
          <div class="action-btn disabled" id="btn-ultimate">ETHER<br>KACHNA</div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
